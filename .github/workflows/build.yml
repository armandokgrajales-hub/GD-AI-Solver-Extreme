# ─────────────────────────────────────────────────────────────────────────────
#  .github/workflows/build.yml  —  GD AI Solver Extreme
#  GitHub Actions CI/CD  ·  armandokgrajales
#
#  Targets
#  ───────
#    • Windows x64   (MSVC — windows-latest runner)
#    • Android ARM64 (arm64-v8a  — ubuntu-latest + NDK)
#    • Android ARMv7 (armeabi-v7a — ubuntu-latest + NDK)
#
#  Key fixes vs. common broken configs
#  ─────────────────────────────────────
#  • Uses geode-sdk/build-geode-mod@main  (only valid ref — no v1/v2/v3 tags exist)
#  • target names match exactly: Win64 | Android64 | Android32
#  • combine step uses geode-sdk/build-geode-mod/combine@main  (same ref)
#  • upload-artifact@v4  (v3 is deprecated on GitHub Actions)
#  • No GEODE_SDK env var needed — the action injects -DGEODE_SDK automatically
# ─────────────────────────────────────────────────────────────────────────────

name: Build GD AI Solver Extreme

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64

          - name: Android ARM64
            os: ubuntu-latest
            target: Android64

          - name: Android ARMv7
            os: ubuntu-latest
            target: Android32

    name: "${{ matrix.config.name }}"
    runs-on: "${{ matrix.config.os }}"

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build ──────────────────────────────────────────────────────────
      #  build-geode-mod@main handles:
      #    • Cloning the Geode SDK at the correct version
      #    • Setting up the NDK toolchain (Android targets)
      #    • Passing -DGEODE_SDK=<path> to cmake automatically
      #    • Uploading partial artifacts named "build-<target>" for combine step
      - name: Build mod (${{ matrix.config.target }})
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: "v4.10.2"
          target: ${{ matrix.config.target }}
          build-config: Release
          combine: true

  # ── Merge all platform artifacts into one .geode ─────────────────────────
  package:
    name: Package .geode
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # combine@main collects "build-Win64", "build-Android64", "build-Android32"
      # artifacts and merges them into a single signed .geode package.
      - name: Combine platform artifacts
        uses: geode-sdk/build-geode-mod/combine@main
        id: combine

      # Upload the final .geode as a downloadable workflow artifact
      - name: Upload .geode
        uses: actions/upload-artifact@v4
        with:
          name: GD-AI-Solver-Extreme
          path: ${{ steps.combine.outputs.build-output }}
          if-no-files-found: error
          retention-days: 30

      # Auto-publish a GitHub Release when a version tag is pushed (e.g. v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.combine.outputs.build-output }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
